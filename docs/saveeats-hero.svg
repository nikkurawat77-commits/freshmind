  <text x="112" y="156" fill="#F6EFE5" font-family="Arial, sans-serif" font-size="26" letter-spacing="6">KITCHEN DEMAND &amp; SERVICE OPERATIONS</text>
  <text x="112" y="282" fill="#FFF8F1" font-family="Arial, sans-serif" font-size="116" font-weight="700">SaveEats</text>
  <text x="112" y="366" fill="#E7DCCC" font-family="Arial, sans-serif" font-size="34">A polished operations platform for restaurants, food trucks, and cafes.</text>
  <text x="112" y="414" fill="#D8C7B3" font-family="Arial, sans-serif" font-size="28">Forecast demand. Protect margin. Reduce waste. Manage subscriptions.</text>

  <rect x="112" y="490" width="220" height="66" rx="33" fill="#F08B48"/>
  <text x="161" y="532" fill="#FFF8F1" font-family="Arial, sans-serif" font-size="28" font-weight="700">Live Preview</text>
