  <text x="892" y="554" fill="#FFF8F1" font-family="Arial, sans-serif" font-size="48" font-weight="700">7:10 PM</text>
  <text x="892" y="592" fill="#CBB9A6" font-family="Arial, sans-serif" font-size="20">Pickup + dine-in pressure rising</text>

  <rect x="1146" y="448" width="278" height="146" rx="24" fill="#FFF7EE" fill-opacity="0.08" stroke="#FFF7EE" stroke-opacity="0.12"/>
