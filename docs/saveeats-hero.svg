  <text x="996" y="332" fill="#D2C4B5" font-family="Arial, sans-serif" font-size="26">Better prep accuracy across recent service windows</text>

  <rect x="860" y="448" width="260" height="146" rx="24" fill="#FFF7EE" fill-opacity="0.08" stroke="#FFF7EE" stroke-opacity="0.12"/>
