  <text x="419" y="532" fill="#F6EFE5" font-family="Arial, sans-serif" font-size="28" font-weight="700">GitHub Repo</text>

  <rect x="952" y="138" width="472" height="254" rx="28" fill="#FFF7EE" fill-opacity="0.09" stroke="#FFF7EE" stroke-opacity="0.12"/>
