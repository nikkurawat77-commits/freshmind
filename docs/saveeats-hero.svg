  <text x="1178" y="592" fill="#CBB9A6" font-family="Arial, sans-serif" font-size="20">Markdown window opens after 8:20 PM</text>

  <rect x="860" y="628" width="564" height="148" rx="24" fill="#FFF7EE" fill-opacity="0.06" stroke="#FFF7EE" stroke-opacity="0.12"/>
