  <text x="896" y="726" fill="#FFF8F1" font-family="Arial, sans-serif" font-size="30" font-weight="700">Forecasting, prep planning, billing, themes, and sales imports</text>
  <text x="896" y="764" fill="#CBB9A6" font-family="Arial, sans-serif" font-size="22">Built as a portfolio-ready product experience, not just a dashboard mockup.</text>

